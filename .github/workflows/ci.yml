name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Stub values — CI does not require live keys; typecheck and lint are key-agnostic.
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/getpostflow
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  UPSTASH_REDIS_REST_URL: ""
  UPSTASH_REDIS_REST_TOKEN: ""
  REDIS_URL: ""
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
  CLERK_SECRET_KEY: sk_test_placeholder
  CLERK_WEBHOOK_SECRET: whsec_placeholder
  STRIPE_SECRET_KEY: sk_test_placeholder
  STRIPE_WEBHOOK_SECRET: whsec_placeholder
  NEXT_PUBLIC_POSTHOG_KEY: phc_placeholder
  NEXT_PUBLIC_POSTHOG_HOST: https://us.i.posthog.com

jobs:
  # ── Typecheck ────────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint || echo "No lint script configured yet — skipping"

  # ── Tests ─────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test || echo "No test script configured yet — skipping"

  # ── Build ─────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
